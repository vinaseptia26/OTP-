name: otp_apk
description: "Aplikasi Pengajuan & Manajemen Lembur Berbasis Flutter + Firebase dengan FCM Notifications"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 FIREBASE
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0

  # 🌐 NETWORK & UTILITIES
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.0.0
  device_info_plus: ^12.3.0
  google_sign_in: ^7.2.0
  country_code_picker: ^3.0.0

  # 🎨 UI / UX
  image_picker: ^1.1.2
  google_fonts: ^8.0.2
  lottie: ^3.1.3
  animations: ^2.0.11
  image: ^4.1.3
  camera: ^0.12.0+1
  file_picker: ^11.0.2
  

  # 📅 PICKER & UI COMPONENT
  table_calendar: ^3.1.2

  # 📊 DATA & VISUALIZATION
  logger: ^2.4.0
  fl_chart: ^1.1.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map_cancellable_tile_provider: ^3.1.1
  flutter_email_sender: ^9.0.0

  # 📄 EXPORT
  pdf: ^3.10.9
  printing: ^5.13.4
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  open_file: ^4.0.0

  # 🔔 NOTIFICATION
  flutter_local_notifications: ^22.0.1

  # 🔐 SECURITY
  crypto: ^3.0.6
  local_auth: ^3.0.1
  biometric_storage: ^5.0.1

  # 🧠 STATE MANAGEMENT
  provider: ^6.1.2
  go_router: ^17.2.3 

  # 📁 FILE
  excel: ^4.0.6
  csv: ^8.0.0
  archive: ^3.6.1

  # 📧 EMAIL
  mailer: ^7.1.0

  # 📱 DEVICE
  permission_handler: ^12.0.1

  # ⚡ PERFORMANCE
  collection: ^1.19.0

  # 🗺️ ROUTING
  url_launcher: ^6.3.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cloudinary_dart: ^0.0.11
  uuid: ^4.2.0

dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

# ICON
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#1976D2"

# SPLASH
flutter_native_splash:
  color: "#1976D2"
  image: "assets/splash/splash.png"
  android: true
  ios: true
  fullscreen: true

  android_12:
    image: "assets/splash/splash_android12.png"
    color: "#1976D2"

  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/font/
    - assets/pertamina/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/font/Poppins-Thin.ttf
          weight: 100
        - asset: assets/font/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/font/Poppins-Light.ttf
          weight: 300
        - asset: assets/font/Poppins-Regular.ttf
          weight: 400
        - asset: assets/font/Poppins-Medium.ttf
          weight: 500
        - asset: assets/font/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/font/Poppins-Bold.ttf
          weight: 700
        - asset: assets/font/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/font/Poppins-Black.ttf
          weight: 900
