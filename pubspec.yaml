name: otp_apk
description: "Aplikasi Pengajuan & Manajemen Lembur Berbasis Flutter + Firebase dengan FCM Notifications"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"  # Kembali ke SDK constraint yang lebih longgar

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 FIREBASE
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0

  # 🌐 NETWORK & UTILITIES
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  intl_phone_field: ^3.2.0
  connectivity_plus: ^7.0.0
  device_info_plus: ^12.3.0
  google_sign_in: ^7.2.0
  country_code_picker: ^3.0.0

  # 🎨 UI / UX
  image_picker: ^1.1.2
  google_fonts: ^8.0.2
  lottie: ^3.1.3
  flutter_animate: ^4.5.2
  awesome_dialog: ^3.2.1
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  image: ^4.1.3
  extended_image: ^10.0.1
  camera: ^0.12.0+1

  # 📅 PICKER & UI COMPONENT
  syncfusion_flutter_datepicker: ^29.2.11
  flutter_slidable: ^4.0.3
  flutter_staggered_animations: ^1.1.0
  timelines: ^0.1.0
  table_calendar: ^3.1.2

  # 📊 DATA & VISUALIZATION
  logger: ^2.4.0
  fl_chart: ^1.1.1
  syncfusion_flutter_charts: ^30.2.6+1
  syncfusion_flutter_datagrid: ^29.2.11
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_cached_tile_provider: ^0.0.2
  geolocator: ^14.0.2
  google_maps_flutter: ^2.10.0
  flutter_typeahead: ^5.2.0
  geocoding: ^4.0.0
  flutter_map_cancellable_tile_provider: ^2.0.0

  # 📄 EXPORT
  syncfusion_flutter_xlsio: ^29.2.11
  syncfusion_flutter_pdf: ^29.2.11
  pdf: ^3.10.9
  printing: ^5.13.4
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  open_file: ^3.3.2
  # 🧠 LOCAL STORAGE
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 🤖 ML
  google_ml_kit: ^0.21.0

  # 🔔 NOTIFICATION
  flutter_local_notifications: ^18.0.1

  # 🔐 SECURITY
  crypto: ^3.0.6
  flutter_dotenv: ^6.0.0
  local_auth: ^3.0.1
  biometric_storage: ^5.0.1

  # 🧠 STATE MANAGEMENT
  provider: ^6.1.2
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.3+1

  # 📁 FILE
  file_picker: ^10.3.10
  excel: ^4.0.6
  csv: ^8.0.0
  archive: ^3.6.1

  # 📧 EMAIL
  mailer: ^7.1.0

  # 📱 DEVICE
  vibration: ^3.1.3
  permission_handler: ^12.0.1
  device_calendar: ^4.1.0

  # 🌐 WEBVIEW
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  webview_flutter_wkwebview: ^3.18.0

  # 🔗 DEEP LINK
  app_links: ^7.0.0

  # ⚡ PERFORMANCE
  collection: ^1.19.0

  # 🌍 LOCALIZATION
  easy_localization: ^3.0.7

  # 🔄 BACKGROUND
  workmanager: ^0.9.0+3
  flutter_background_service: ^5.0.10
  background_fetch: ^1.3.9

  # 📡 NETWORK INFO
  network_info_plus: ^7.0.0

  # 🗺️ ROUTING
  go_router: ^17.1.0
  auto_route: ^9.2.2
  url_launcher: ^6.3.2

dependency_overrides:
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  # ✅ Diturunkan dari ^5.0.0

  build_runner: ^2.4.9  # ✅ Diturunkan dari ^2.4.14
  auto_route_generator: ^9.0.0
  json_serializable: ^6.8.0  # ✅ Diturunkan dari ^6.9.0
  freezed: ^2.4.7  # ✅ Diturunkan dari ^2.5.7
  freezed_annotation: ^2.4.1  # ✅ Diturunkan dari ^2.4.4
  hive_generator: ^2.0.0  # ✅ Diturunkan dari ^2.0.1

# ICON
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#1976D2"

# SPLASH
flutter_native_splash:
  color: "#1976D2"
  image: "assets/splash/splash.png"
  android: true
  ios: true
  fullscreen: true

  android_12:
    image: "assets/splash/splash_android12.png"
    color: "#1976D2"

  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/font/
    - assets/pertamina/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/font/Poppins-Thin.ttf
          weight: 100
        - asset: assets/font/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/font/Poppins-Light.ttf
          weight: 300
        - asset: assets/font/Poppins-Regular.ttf
          weight: 400
        - asset: assets/font/Poppins-Medium.ttf
          weight: 500
        - asset: assets/font/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/font/Poppins-Bold.ttf
          weight: 700
        - asset: assets/font/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/font/Poppins-Black.ttf
          weight: 900

    - family: NotoSans
      fonts:
        - asset: assets/font/NotoSans-Regular.ttf
        - asset: assets/font/NotoSans-Bold.ttf
          weight: 700